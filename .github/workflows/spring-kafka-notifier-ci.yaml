name: spring-kafka-notifier service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/spring-kafka-notifier-ci.yaml"
      - ".github/workflows/reusable-backend-service-ci.yaml"
      - "services/spring-kafka-notifier/**"
      - "parent-pom/**"
      - "base-platform/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/spring-kafka-notifier-ci.yaml"
      - ".github/workflows/reusable-backend-service-ci.yaml"
      - "services/spring-kafka-notifier/**"
      - "parent-pom/**"
      - "base-platform/**"
      
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-backend-service-ci.yaml
    with:
      service-name: "spring-kafka-notifier"
      service-path: "services/spring-kafka-notifier"
      sonar-project-key: "hvantran_spring-kafka-notifier"
      docker-image-name: "spring-kafka-notifier"
      jacoco-enabled: true
      build-native: false
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: spring-kafka-notifier
          path: services/spring-kafka-notifier/*.jar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set VERSION environment variable
        run: |
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Build and push
        run: |
          mvn clean install -Ddockerfile.skip=true -DskipTests -P native -f services/spring-kafka-notifier spring-boot:build-image
          docker tag spring-kafka-notifier:${{ env.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/spring-kafka-notifier:latest
          docker tag spring-kafka-notifier:${{ env.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/spring-kafka-notifier:1.0.${{github.run_number}}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-kafka-notifier:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-kafka-notifier:1.0.${{github.run_number}}
