name: Reusable Backend Service CI

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name for display'
      service-path:
        required: true
        type: string
        description: 'Path to service directory (e.g., services/action-manager-app/action-manager-backend)'
      sonar-project-key:
        required: true
        type: string
        description: 'SonarCloud project key'
      docker-image-name:
        required: true
        type: string
        description: 'Docker Hub image name'
      jacoco-enabled:
        required: false
        type: boolean
        default: false
        description: 'Enable JaCoCo coverage report'
      build-native:
        required: false
        type: boolean
        default: false
        description: 'Build native image with Spring Boot'
    secrets:
      ACCESS_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  CI: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven build
        run: |
          mvn clean install -f parent-pom &&
          mvn clean -f base-platform dependency:tree &&
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform &&
          mvn clean -f ${{ inputs.service-path }} dependency:tree &&
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f ${{ inputs.service-path }}

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven test
        run: |
          mvn clean install -f parent-pom && 
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform &&
          mvn clean install -Dmaven.test.failure.ignore=true -P test -f ${{ inputs.service-path }}
      - name: Unit test results
        uses: dorny/test-reporter@v1
        if: failure()
        with:
          name: Unit-Test-Results
          path: "${{ inputs.service-path }}/**/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true
      - name: Upload JaCoCo coverage report
        if: inputs.jacoco-enabled
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: ${{ inputs.service-path }}/target/site/jacoco/
      - name: Jacoco Badge Generator
        if: inputs.jacoco-enabled
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: ${{ inputs.service-path }}/target/site/jacoco/jacoco.csv

  sonar:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Analyze with sonar cloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean install -f parent-pom &&
          mvn clean install -Ddockerfile.skip=true -DskipTests -f base-platform &&
          mvn clean install -Ddockerfile.skip=true -DskipTests -Dsonar.qualitygate.wait=true -Dsonar.projectKey=${{ inputs.sonar-project-key }} sonar:sonar -f ${{ inputs.service-path }}

  deploy:
    needs: sonar
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven package
        run: |
          mvn clean install -f parent-pom && 
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/**/*.jar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set VERSION environment variable
        run: |
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Build and push (standard)
        if: ${{ !inputs.build-native }}
        run: |
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f ${{ inputs.service-path }}
          docker tag ${{ inputs.docker-image-name }}:${{ env.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest
          docker tag ${{ inputs.docker-image-name }}:${{ env.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:1.0.${{github.run_number}}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:1.0.${{github.run_number}}
      - name: Build and push (native)
        if: inputs.build-native
        run: |
          mvn clean install -Ddockerfile.skip=true -DskipTests -P native -f ${{ inputs.service-path }} spring-boot:build-image
          docker tag ${{ inputs.docker-image-name }}:${{ env.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest
          docker tag ${{ inputs.docker-image-name }}:${{ env.VERSION }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:1.0.${{github.run_number}}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:1.0.${{github.run_number}}
