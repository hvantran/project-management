name: Reusable Base Platform Service CI

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name for display'
      service-path:
        required: true
        type: string
        description: 'Path to service directory (e.g., base-platform/common-apps/spring-cloud-gateway-app)'
      docker-image-name:
        required: true
        type: string
        description: 'Docker Hub image name'
      docker-context:
        required: true
        type: string
        description: 'Docker build context'
      dockerfile-path:
        required: true
        type: string
        description: 'Path to Dockerfile'
    secrets:
      ACCESS_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  CI: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven build
        run: |
          mvn clean install -f parent-pom &&
          mvn clean -f base-platform dependency:tree &&
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven test
        run: |
          mvn clean install -f parent-pom && 
          mvn clean install -Dmaven.test.failure.ignore=true -P test -f ${{ inputs.service-path }}
      - name: Unit test results
        uses: dorny/test-reporter@v1
        if: failure()
        with:
          name: Unit-Test-Results
          path: "${{ inputs.service-path }}/**/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Only deploy on push to main, skip on PRs
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven package
        run: |
          mvn clean install -f parent-pom && 
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/target/*.jar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set VERSION environment variable
        run: |
          cd ${{ inputs.service-path }}
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest,${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:1.0.${{github.run_number}}
