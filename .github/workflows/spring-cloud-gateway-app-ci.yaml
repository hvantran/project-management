name: spring-cloud-gateway-app service ci

env:
  CI: false

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/spring-cloud-gateway-app-ci.yaml"
      - "base-platform/common-apps/spring-cloud-gateway-app/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/spring-cloud-gateway-app-ci.yaml"
      - "base-platform/common-apps/spring-cloud-gateway-app/**"
      
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run maven build
        run: |
          mvn clean install -f parent-pom &&
          mvn clean -f base-platform dependency:tree &&
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform

  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run maven test
        run: |
          mvn clean install -f parent-pom && 
          mvn clean install -Dmaven.test.failure.ignore=true -P test -f base-platform/common-apps/spring-cloud-gateway-app
      - name: Unit test results
        uses: dorny/test-reporter@v1
        if: failure()
        with:
          name: Unit-Test-Results
          path: "base-platform/common-apps/spring-cloud-gateway-app/**/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: true

  Deploy:
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run maven package
        run: |
          mvn clean install -f parent-pom && 
          mvn clean install -Ddockerfile.skip=true -DskipTests -P prod -f base-platform
      - uses: actions/upload-artifact@v4
        with:
          name: spring-cloud-gateway-app
          path: base-platform/common-apps/spring-cloud-gateway-app/target/*.jar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set VERSION environment variable
        run: |
          cd base-platform/common-apps/spring-cloud-gateway-app
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./base-platform/common-apps/spring-cloud-gateway-app/target
          file: ./base-platform/common-apps/spring-cloud-gateway-app/target/classes/Dockerfile
          push: true
          tags: tranvanhoa2810/spring-cloud-gateway-app:latest,tranvanhoa2810/spring-cloud-gateway-app:1.0.${{github.run_number}}
