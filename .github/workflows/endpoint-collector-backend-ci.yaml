name: endpoint-collector-backend service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/endpoint-collector-backend-ci.yaml"
      - ".github/workflows/reusable-backend-service-ci.yaml"
      - "services/external-endpoint-collector/**"
      - "parent-pom/**"
      - "base-platform/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/endpoint-collector-backend-ci.yaml"
      - ".github/workflows/reusable-backend-service-ci.yaml"
      - "services/external-endpoint-collector/**"
      - "parent-pom/**"
      - "base-platform/**"
  
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-backend-service-ci.yaml
    with:
      service-name: "endpoint-collector-backend"
      service-path: "services/external-endpoint-collector/endpoint-collector-backend"
      sonar-project-key: "hvantran_external-endpoint-collector"
      docker-image-name: "endpoint-collector-backend"
      jacoco-enabled: false
      build-native: true
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
