name: template-manager-ui service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/template-manager-ui-ci.yaml"
      - ".github/workflows/reusable-ui-service-ci.yaml"
      - "services/template-management-app/template-manager-ui/**"
      - "parent-pom/**"
      - "base-platform/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/template-manager-ui-ci.yaml"
      - ".github/workflows/reusable-ui-service-ci.yaml"
      - "services/template-management-app/template-manager-ui/**"
      - "parent-pom/**"
      - "base-platform/**"
      
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-ui-service-ci.yaml
    with:
      service-name: "template-manager-ui"
      service-path: "services/template-management-app/template-manager-ui"
      docker-image-name: "template-manager-ui"
      docker-context: "./services/template-management-app/template-manager-ui"
      dockerfile-path: "./services/template-management-app/template-manager-ui/Dockerfile"
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
