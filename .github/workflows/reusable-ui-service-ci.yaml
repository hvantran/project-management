name: Reusable UI Service CI

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name for display'
      service-path:
        required: true
        type: string
        description: 'Path to service directory (e.g., services/action-manager-app/action-manager-ui)'
      docker-image-name:
        required: true
        type: string
        description: 'Docker Hub image name'
      docker-context:
        required: true
        type: string
        description: 'Docker build context path'
      dockerfile-path:
        required: true
        type: string
        description: 'Path to Dockerfile'
    secrets:
      ACCESS_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  CI: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven build
        run: |
          mvn clean install -DskipTests -P prod -f parent-pom &&
          mvn clean install -DskipTests -P prod -f base-platform &&
          mvn clean install -DskipTests -P prod -f ${{ inputs.service-path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy on push to main, skip on PRs
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.ACCESS_TOKEN }}
          fetch-depth: 1
      - uses: ./.github/workflows/actions
      - name: Run maven package
        run: mvn clean package -DskipTests -P prod -f ${{ inputs.service-path }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:latest,${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker-image-name }}:1.0.${{github.run_number}}
